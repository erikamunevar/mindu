<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MINDU - Ingreso</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body class="login-body">
  <main class="login-page">
    <div class="login-wrapper">
<br>
      <div class="login-card-wrapper">
        <img src="/img/logo.png" alt="MINDU logo" style="width: 200px; height: 200px;" class="login-logo-overlap">
<br><br><br><br><br><br>
      <h4 class="login-heading">Ingreso de Estudiantes</h4>

        <section class="login-card">
        <form action="/tareas" method="get">
          <div class="mb-3">
            <label for="usuario" class="form-label">Usuario:</label>
            <input type="text" id="usuario" name="usuario" class="form-control" placeholder="" required>
          </div>

          <div class="mb-4">
            <label for="contrasena" class="form-label">Contraseña:</label>
            <input type="password" id="contrasena" name="contrasena" class="form-control" placeholder="" required>
          </div>

          <button type="submit" class="btn btn-primary w-100">Ingresar</button>
        </form>

        <div class="text-center mt-3 forgot-password">
          <a href="#">Olvidé mi contraseña</a>
        </div>
      </section>
        <p class="copyright">© Copyright Todos los derechos reservados 2026</p>
      </section>
    </div>
  </main>
</body>
</html>
